<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ya ultah sih</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      text-align: center;
      overflow-x: hidden;
      min-height: 100vh;
    }


    /* CARD TENGAH */
    .card {
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(1000px);
      border-radius: 20px;
      padding: 30px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      max-width: 400px;
      margin: auto;
      animation: pop 0.5s ease;
    }

    @keyframes pop {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-size: clamp(32px, 7vw, 56px);
      margin-bottom: 10px;
    }

    p {
      font-size: clamp(16px, 3.6vw, 22px);
      margin: 8px 0;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      font-size: clamp(16px, 3.6vw, 20px);
      border: 2px solid black;
      background: #ff69b4;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #ff85c1;
      transform: scale(1.05);
    }

    .screen {
      min-height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .screen.active { display: flex; }

    .line {
      opacity: 0;
      transform: translateY(-20px);
      animation: muncul 0.8s forwards;
    }

    .line:nth-child(1){animation-delay:.3s}
    .line:nth-child(2){animation-delay:1s}
    .line:nth-child(3){animation-delay:1.7s}
    .line:nth-child(4){animation-delay:2.4s}
    .line:nth-child(5){animation-delay:3.1s}
    .line:nth-child(6){animation-delay:3.8s}

    @keyframes muncul {
      to { opacity:1; transform:translateY(0); }
    }

    .jatuh {
      position: fixed;
      top: -80px;
      z-index: -1;
      pointer-events: none;
      animation: jatoh linear forwards;
    }

    @keyframes jatoh {
      to {
        transform: translateY(120vh) rotate(360deg);
        opacity: 0.85;
      }
    }

    .side-img {
      display: none;
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 120px;
      z-index: 0;
      animation: goyang 1.2s infinite alternate;
    }

    .left-img { left: 10px; }
    .right-img { right: 10px; }

    @keyframes goyang {
      from { transform: translateY(-50%) rotate(-4deg); }
      to { transform: translateY(-50%) rotate(4deg); }
    }

    /* MOBILE */
    @media (max-width: 480px) {
      .side-img {
        display: block;
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        width: 110px;
        animation: none;
        opacity: 0.9;
      }

      .left-img { top: 10px; }
      .right-img { bottom: 10px; top: auto; }

      .container {
        padding-top: 140px;
        padding-bottom: 140px;
      }
    }

  </style>
</head>

<body>

<audio id="lagu" src="./lagu.mp3"></audio>

<img id="gambarKiri" class="side-img left-img" src="kiri.jpeg">
<img id="gambarKanan" class="side-img right-img" src="kanan.jpeg">



  <!-- SCREEN 1 -->
  <div id="screenAwal" class="screen active">
    <div class="card">
      <h1>warning</h1>
      <p>pesan ini dibuat dengan niat seadanya</p>
      <p>tetap dibuka karena aku terlanjur bikin</p>
      <button onclick="mulaiAcara()">pencettt</button>
    </div>
  </div>

  <!-- SCREEN 2 -->
  <div id="screenHbd" class="screen">
    <div class="card">
      <h1 class="line">HBD KAQ 🎉</h1>
      <p class="line">alhamdulillah umur nambah lagi WKWK</p>
      <p class="line">semoga sehat, bahagia, dan nga banyak drama</p>
      <p class="line">tetep samawa yeach</p>
      <p class="line">manifesting kaya raya</p>
      <p class="line">ingfo jajan</p>

      <button onclick="hujanAbsurd()">spam emot</button>
      <button onclick="showCakeScreen()">mau kue 🎂</button>
    </div>
  </div>

  <!-- SCREEN 3 -->
  <div id="screenCake" class="screen">
    <div class="card">
      <h1>nih kuenya 🎂</h1>
      <img src="kue.jpg" style="width:250px;border-radius:12px;">
      <p>semoga hidupmu semanis kue ini</p>
      <button onclick="hujanAbsurd()">spam emot</button>
    </div>
  </div>

</div>

<script>
let sudahMulai = false;

const gambarHujan = ["pic1.png","pic2.png","pic3.png","pic4.png","pic5.png"];

function gantiScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function mulaiAcara(){
  if(sudahMulai) return;
  sudahMulai = true;

  const lagu = document.getElementById('lagu');
  lagu.volume = 0.4;
  lagu.loop = true;
  lagu.play().catch(e=>console.log(e));

  gantiScreen('screenHbd');

  document.getElementById('gambarKiri').style.display='block';
  document.getElementById('gambarKanan').style.display='block';

  hujanAbsurd();
}

function showCakeScreen(){
  gantiScreen('screenCake');
  hujanAbsurd();
}
let intervalHujan;
function hujanAbsurd(){
  hujanEmoji();
  hujanGambar();

  // loop tiap 3 detik
  if (!intervalHujan) {
    intervalHujan = setInterval(() => {
      hujanEmoji();
      hujanGambar();
    }, 3000);
  }
}

function hujanEmoji(){
  const isi=['🎉','🎂','😭','🔥','💀','⭐','😱','💥','💖','✨','🎊'];
  for(let i=0;i<120;i++){
    setTimeout(()=>{
      const e=document.createElement('div');
      e.className='jatuh';
      e.innerText=isi[Math.floor(Math.random()*isi.length)];
      e.style.left=Math.random()*window.innerWidth+'px';
      e.style.fontSize=(10+Math.random()*20)+'px';
      e.style.animationDuration=(2+Math.random()*2)+'s';
      document.body.appendChild(e);
      setTimeout(()=>e.remove(),5000);
    },i*20);
  }
}

function hujanGambar(){
  for(let i=0;i<40;i++){
    setTimeout(()=>{
      const img=document.createElement('img');
      img.className='jatuh';
      img.src=gambarHujan[Math.floor(Math.random()*gambarHujan.length)];
      img.style.left=Math.random()*window.innerWidth+'px';
      img.style.width=(60+Math.random()*80)+'px';
      img.style.animationDuration=(3+Math.random()*3)+'s';
      document.body.appendChild(img);
      setTimeout(()=>img.remove(),5500);
    },i*75);
  }
}
</script>

</body>
</html>
